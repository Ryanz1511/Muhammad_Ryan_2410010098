<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permainan Domino</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#2c3e50;
    color:white;
}

h1{
    margin-top:20px;
}

#board{
    min-height:100px;
    margin:20px;
    padding:10px;
    border:2px solid white;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
}

#playerHand{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
}

.domino{
    width:60px;
    height:100px;
    background:white;
    color:black;
    border-radius:8px;
    border:2px solid black;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    justify-content:space-around;
    align-items:center;
    font-size:24px;
    font-weight:bold;
}

.domino:hover{
    transform:scale(1.05);
}

.line{
    width:100%;
    height:2px;
    background:black;
}

button{
    padding:10px 20px;
    margin:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>🎲 Permainan Domino</h1>

<h3>Meja Domino</h3>
<div id="board"></div>

<h3>Kartu Anda</h3>
<div id="playerHand"></div>

<p id="status"></p>

<button onclick="startGame()">Mulai Ulang</button>

<script>
let deck = [];
let player = [];
let computer = [];
let board = [];

function createDeck(){
    deck = [];
    for(let i=0;i<=6;i++){
        for(let j=i;j<=6;j++){
            deck.push([i,j]);
        }
    }
}

function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

function dominoHTML(tile){
    return `
        <div class="domino">
            <div>${tile[0]}</div>
            <div class="line"></div>
            <div>${tile[1]}</div>
        </div>
    `;
}

function startGame(){
    createDeck();
    shuffle(deck);

    player = deck.splice(0,7);
    computer = deck.splice(0,7);

    board = [deck.pop()];

    render();
}

function render(){
    const boardDiv = document.getElementById("board");
    boardDiv.innerHTML = "";

    board.forEach(tile=>{
        boardDiv.innerHTML += dominoHTML(tile);
    });

    const handDiv = document.getElementById("playerHand");
    handDiv.innerHTML = "";

    player.forEach((tile,index)=>{
        const div = document.createElement("div");
        div.innerHTML = dominoHTML(tile);
        div.onclick = ()=>playTile(index);
        handDiv.appendChild(div);
    });

    document.getElementById("status").innerText =
        `Komputer memiliki ${computer.length} kartu`;
}

function playTile(index){
    const tile = player[index];

    const left = board[0][0];
    const right = board[board.length-1][1];

    if(tile[0]===right){
        board.push(tile);
    }
    else if(tile[1]===right){
        board.push([tile[1],tile[0]]);
    }
    else if(tile[1]===left){
        board.unshift(tile);
    }
    else if(tile[0]===left){
        board.unshift([tile[1],tile[0]]);
    }
    else{
        alert("Kartu tidak cocok!");
        return;
    }

    player.splice(index,1);

    if(player.length===0){
        alert("🎉 Anda Menang!");
        startGame();
        return;
    }

    computerTurn();
    render();
}

function computerTurn(){
    const left = board[0][0];
    const right = board[board.length-1][1];

    for(let i=0;i<computer.length;i++){
        const tile = computer[i];

        if(tile[0]===right){
            board.push(tile);
            computer.splice(i,1);
            break;
        }
        else if(tile[1]===right){
            board.push([tile[1],tile[0]]);
            computer.splice(i,1);
            break;
        }
        else if(tile[1]===left){
            board.unshift(tile);
            computer.splice(i,1);
            break;
        }
        else if(tile[0]===left){
            board.unshift([tile[1],tile[0]]);
            computer.splice(i,1);
            break;
        }
    }

    if(computer.length===0){
        alert("💻 Komputer Menang!");
        startGame();
    }
}

startGame();
</script>

</body>
</html>
